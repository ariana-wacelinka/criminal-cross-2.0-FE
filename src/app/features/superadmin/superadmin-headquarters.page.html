<section class="px-4 py-6 text-athlium-text lg:px-8">
  <header
    class="rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-athlium-muted">Superadmin</p>
    <h1 class="mt-2 font-title text-3xl font-semibold">Sedes</h1>
    <p class="mt-1 text-sm text-athlium-muted">Vista de sedes por organizacion.</p>
  </header>

  <div
    class="mt-5 overflow-x-auto rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <table class="w-full min-w-[680px] text-left text-sm">
      <thead class="text-athlium-muted">
        <tr class="border-b border-athlium-primary/10">
          <th class="py-2 font-medium">Sede</th>
          <th class="py-2 font-medium">Organizacion</th>
          <th class="py-2 font-medium">Estado</th>
        </tr>
      </thead>
      <tbody>
        @for (hq of headquartersView(); track hq.id) {
          <tr class="border-b border-athlium-primary/10 last:border-b-0">
            <td class="py-3 font-medium">{{ hq.name }}</td>
            <td class="py-3 text-athlium-muted">{{ hq.organizationName }}</td>
            <td class="py-3">
              <span
                class="rounded-full border border-athlium-accent/35 bg-athlium-accent/15 px-2 py-1 text-xs font-semibold text-athlium-accent"
              >
                Activa
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
