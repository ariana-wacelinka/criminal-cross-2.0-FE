<section class="px-4 py-6 text-athlium-text lg:px-8">
  <header
    class="rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-athlium-muted">Superadmin</p>
    <h1 class="mt-2 font-title text-3xl font-semibold">Crear usuario</h1>
    <p class="mt-1 text-sm text-athlium-muted">Alta de usuario base.</p>
  </header>

  <form
    class="mt-5 rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
    [formGroup]="form"
    (ngSubmit)="save()"
  >
    <div class="grid gap-4 sm:grid-cols-2">
      <label class="grid gap-2 text-sm">
        <span class="text-athlium-muted">Nombre</span>
        <input
          class="appearance-none rounded-xl border border-athlium-primary/14 bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
          formControlName="name"
          placeholder="Nombre"
          type="text"
        />
      </label>

      <label class="grid gap-2 text-sm">
        <span class="text-athlium-muted">Apellido</span>
        <input
          class="appearance-none rounded-xl border border-athlium-primary/14 bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
          formControlName="lastName"
          placeholder="Apellido"
          type="text"
        />
      </label>

      <label class="grid gap-2 text-sm">
        <span class="text-athlium-muted">Email</span>
        <input
          class="appearance-none rounded-xl border border-athlium-primary/14 bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
          formControlName="email"
          placeholder="Email"
          type="email"
        />
      </label>
    </div>

    <div class="mt-5 flex items-center gap-2">
      <button
        type="submit"
        class="rounded-xl bg-athlium-primary px-4 py-2 font-semibold text-athlium-text transition hover:brightness-110"
      >
        Crear
      </button>
      <button
        type="button"
        class="rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/35 px-4 py-2 font-semibold text-athlium-text transition hover:bg-athlium-surface-2/55"
        (click)="cancel()"
      >
        Cancelar
      </button>
    </div>
  </form>
</section>
