<section class="px-4 py-6 text-athlium-text lg:px-8">
  <header class="rounded-panel border border-red-400/20 bg-athlium-surface/90 p-5 shadow-soft">
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-athlium-muted">Superadmin</p>
    <h1 class="mt-2 font-title text-3xl font-semibold">Eliminar usuario</h1>
    <p class="mt-1 text-sm text-athlium-muted">Acción sensible para gestión administrativa.</p>
  </header>

  <article
    class="mt-5 rounded-panel border border-red-400/20 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <p class="text-sm text-athlium-muted">Vas a eliminar al usuario:</p>
    <p class="mt-1 text-xl font-semibold text-athlium-text">
      {{ user().name }} {{ user().lastName }}
    </p>
    <p class="text-sm text-athlium-muted">{{ user().email }}</p>

    <p
      class="mt-4 rounded-xl border border-red-400/25 bg-red-500/10 px-3 py-2 text-sm text-red-200"
    >
      Esta acción removerá el usuario del listado visible.
    </p>

    <div class="mt-5 flex items-center gap-2">
      <button
        type="button"
        class="rounded-xl border border-red-400/35 bg-red-500/10 px-4 py-2 font-semibold text-red-200 transition hover:bg-red-500/20"
        (click)="confirmDelete()"
      >
        Confirmar eliminación
      </button>
      <button
        type="button"
        class="rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/35 px-4 py-2 font-semibold text-athlium-text transition hover:bg-athlium-surface-2/55"
        (click)="cancel()"
      >
        Cancelar
      </button>
    </div>
  </article>
</section>
