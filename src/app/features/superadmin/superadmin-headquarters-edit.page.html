<section class="px-4 py-6 text-athlium-text lg:px-8">
  <header
    class="rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-athlium-muted">
      {{ roleBadgeLabel() }}
    </p>
    <h1 class="mt-2 font-title text-3xl font-semibold">Editar sede</h1>
    <p class="mt-1 text-sm text-athlium-muted">{{ pageDescription() }}</p>
  </header>

  <form
    class="mt-5 rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
    [formGroup]="form"
    (ngSubmit)="save()"
  >
    <div class="grid gap-4 sm:grid-cols-2">
      <label class="grid gap-2 text-sm">
        <span class="text-athlium-muted">Organización</span>
        @if (isSuperadmin()) {
          <select
            class="ath-select appearance-none rounded-xl border bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
            [class.border-red-400/45]="
              form.controls.organizationId.invalid && form.controls.organizationId.touched
            "
            [class.border-athlium-primary/14]="
              !(form.controls.organizationId.invalid && form.controls.organizationId.touched)
            "
            formControlName="organizationId"
          >
            @for (organization of organizations(); track organization.id) {
              <option [value]="organization.id">{{ organization.name }}</option>
            }
          </select>
          @if (form.controls.organizationId.invalid && form.controls.organizationId.touched) {
            <p class="text-xs text-red-300">Selecciona una organización.</p>
          }
        } @else {
          <input
            class="appearance-none rounded-xl border border-athlium-primary/14 bg-athlium-primary-soft/45 px-3 py-2 text-sm text-athlium-muted outline-none"
            [value]="headquartersOrganizationName()"
            readonly
            type="text"
          />
        }
      </label>

      <label class="grid gap-2 text-sm">
        <span class="text-athlium-muted">Nombre de la sede</span>
        <input
          class="appearance-none rounded-xl border bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
          [class.border-red-400/45]="
            form.controls.name.hasError('required') && form.controls.name.touched
          "
          [class.border-athlium-primary/14]="
            !(form.controls.name.hasError('required') && form.controls.name.touched)
          "
          formControlName="name"
          placeholder="Nombre"
          type="text"
        />
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <p class="text-xs text-red-300">Ingresa el nombre de la sede.</p>
        }
      </label>
    </div>

    <div class="mt-5 flex items-center gap-2">
      <button
        type="submit"
        class="rounded-xl bg-athlium-primary px-4 py-2 font-semibold text-athlium-text transition hover:brightness-110"
      >
        Guardar cambios
      </button>
      <button
        type="button"
        class="rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/35 px-4 py-2 font-semibold text-athlium-text transition hover:bg-athlium-surface-2/55"
        (click)="cancel()"
      >
        Cancelar
      </button>
    </div>
  </form>
</section>
