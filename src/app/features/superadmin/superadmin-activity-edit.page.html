<section class="px-4 py-6 text-athlium-text lg:px-8">
  <header
    class="rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
  >
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-athlium-muted">Superadmin</p>
    <h1 class="mt-2 font-title text-3xl font-semibold">Editar actividad</h1>
    <p class="mt-1 text-sm text-athlium-muted">Actualiza los datos de la actividad.</p>
  </header>

  @if (isLoading()) {
    <article
      class="mt-5 rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
    >
      <div class="grid gap-4">
        @for (item of [1, 2, 3]; track item) {
          <div class="animate-pulse rounded-xl bg-athlium-surface-2/45 px-3 py-3">
            <div class="h-3 w-28 rounded bg-athlium-primary/20"></div>
            <div class="mt-2 h-10 w-full rounded bg-athlium-primary/15"></div>
          </div>
        }
      </div>
    </article>
  } @else {
    <form
      class="mt-5 rounded-panel border border-athlium-primary/10 bg-athlium-surface/90 p-5 shadow-soft"
      [formGroup]="form"
      (ngSubmit)="save()"
    >
      <div class="grid gap-4">
        <label class="grid gap-2 text-sm">
          <span class="text-athlium-muted">Nombre</span>
          <input
            class="appearance-none rounded-xl border bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
            [class.border-red-400/45]="
              form.controls.name.hasError('required') && form.controls.name.touched
            "
            [class.border-athlium-primary/14]="
              !(form.controls.name.hasError('required') && form.controls.name.touched)
            "
            formControlName="name"
            type="text"
          />
          @if (form.controls.name.hasError('required') && form.controls.name.touched) {
            <p class="text-xs text-red-300">Ingresa el nombre de la actividad.</p>
          }
        </label>

        <label class="grid gap-2 text-sm">
          <span class="text-athlium-muted">Descripción</span>
          <textarea
            class="appearance-none rounded-xl border bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
            [class.border-red-400/45]="
              form.controls.description.hasError('required') && form.controls.description.touched
            "
            [class.border-athlium-primary/14]="
              !(form.controls.description.hasError('required') && form.controls.description.touched)
            "
            formControlName="description"
            rows="3"
          ></textarea>
          @if (
            form.controls.description.hasError('required') && form.controls.description.touched
          ) {
            <p class="text-xs text-red-300">Ingresa una descripción de la actividad.</p>
          }
        </label>

        <label class="grid gap-2 text-sm">
          <span class="text-athlium-muted">Cupo máximo por clase</span>
          <input
            class="appearance-none rounded-xl border bg-athlium-primary-soft/60 px-3 py-2 text-sm text-athlium-text outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
            [class.border-red-400/45]="
              form.controls.maxParticipants.invalid && form.controls.maxParticipants.touched
            "
            [class.border-athlium-primary/14]="
              !(form.controls.maxParticipants.invalid && form.controls.maxParticipants.touched)
            "
            formControlName="maxParticipants"
            min="1"
            type="number"
          />
          @if (
            form.controls.maxParticipants.hasError('required') &&
            form.controls.maxParticipants.touched
          ) {
            <p class="text-xs text-red-300">Ingresa el cupo máximo.</p>
          }
          @if (
            form.controls.maxParticipants.hasError('min') && form.controls.maxParticipants.touched
          ) {
            <p class="text-xs text-red-300">El cupo mínimo es 1.</p>
          }
        </label>
      </div>

      <div class="mt-5 flex items-center gap-2">
        <button
          type="submit"
          class="rounded-xl bg-athlium-primary px-4 py-2 text-sm font-semibold text-athlium-text transition hover:brightness-110"
        >
          Guardar cambios
        </button>
        <button
          type="button"
          class="rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/35 px-4 py-2 text-sm font-semibold text-athlium-text transition hover:bg-athlium-surface-2/55"
          (click)="cancel()"
        >
          Cancelar
        </button>
      </div>
    </form>
  }
</section>
