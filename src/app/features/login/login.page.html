<main class="relative mx-auto flex min-h-screen w-full max-w-md items-center px-4 py-8">
  <div
    class="pointer-events-none absolute inset-x-8 top-12 h-44 rounded-full bg-athlium-primary/20 blur-3xl"
  ></div>

  <section
    class="relative w-full rounded-panel border border-athlium-primary/10 bg-athlium-surface p-6 shadow-soft backdrop-blur"
  >
    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-athlium-muted">
      Athlium Access
    </p>
    <div
      class="mt-3 grid grid-cols-2 gap-2 rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/55 p-1"
    >
      <button
        type="button"
        class="rounded-lg px-3 py-2 text-sm font-semibold transition"
        [class.bg-athlium-primary]="mode() === 'login'"
        [class.text-white]="mode() === 'login'"
        [class.text-athlium-muted]="mode() !== 'login'"
        (click)="setMode('login')"
      >
        Ingresar
      </button>
      <button
        type="button"
        class="rounded-lg px-3 py-2 text-sm font-semibold transition"
        [class.bg-athlium-primary]="mode() === 'register'"
        [class.text-white]="mode() === 'register'"
        [class.text-athlium-muted]="mode() !== 'register'"
        (click)="setMode('register')"
      >
        Registro
      </button>
    </div>

    <h1 class="mt-4 font-title text-3xl font-semibold">
      {{ mode() === 'login' ? 'Ingresar' : 'Crear cuenta' }}
    </h1>
    <p class="mt-1 text-sm text-athlium-muted">
      {{
        mode() === 'login'
          ? 'Ingresa con email y contraseña'
          : 'Completá tus datos para crear la cuenta'
      }}
    </p>

    @if (errorMessage()) {
      <p
        class="mt-4 rounded-lg border px-3 py-2 text-sm"
        [class.border-red-500/40]="feedbackTone() === 'error'"
        [class.bg-red-500/10]="feedbackTone() === 'error'"
        [class.text-red-200]="feedbackTone() === 'error'"
        [class.border-emerald-500/40]="feedbackTone() === 'success'"
        [class.bg-emerald-500/10]="feedbackTone() === 'success'"
        [class.text-emerald-100]="feedbackTone() === 'success'"
      >
        {{ errorMessage() }}
      </p>
    }

    <form class="mt-4 grid gap-3" [formGroup]="form" (ngSubmit)="submit()">
      @if (mode() === 'register') {
        <div class="grid gap-3 sm:grid-cols-2">
          <label class="grid min-w-0 gap-1.5">
            <input
              class="w-full appearance-none rounded-xl border bg-athlium-primary-soft/65 px-3 py-2 text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
              [class.border-red-400/45]="
                form.controls.name.hasError('required') && form.controls.name.touched
              "
              [class.border-athlium-primary/15]="
                !(form.controls.name.hasError('required') && form.controls.name.touched)
              "
              type="text"
              placeholder="Nombre"
              formControlName="name"
            />
            @if (form.controls.name.hasError('required') && form.controls.name.touched) {
              <p class="text-xs text-red-300">Ingresa tu nombre.</p>
            }
          </label>

          <label class="grid min-w-0 gap-1.5">
            <input
              class="w-full appearance-none rounded-xl border bg-athlium-primary-soft/65 px-3 py-2 text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
              [class.border-red-400/45]="
                form.controls.lastName.hasError('required') && form.controls.lastName.touched
              "
              [class.border-athlium-primary/15]="
                !(form.controls.lastName.hasError('required') && form.controls.lastName.touched)
              "
              type="text"
              placeholder="Apellido"
              formControlName="lastName"
            />
            @if (form.controls.lastName.hasError('required') && form.controls.lastName.touched) {
              <p class="text-xs text-red-300">Ingresa tu apellido.</p>
            }
          </label>
        </div>
      }

      <label class="grid min-w-0 gap-1.5">
        <input
          id="login-email"
          name="email"
          class="w-full appearance-none rounded-xl border bg-athlium-primary-soft/65 px-3 py-2 text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
          [class.border-red-400/45]="form.controls.email.invalid && form.controls.email.touched"
          [class.border-athlium-primary/15]="
            !(form.controls.email.invalid && form.controls.email.touched)
          "
          type="email"
          autocomplete="username"
          placeholder="Email"
          formControlName="email"
        />
        @if (form.controls.email.hasError('required') && form.controls.email.touched) {
          <p class="text-xs text-red-300">Ingresa tu email.</p>
        }
        @if (form.controls.email.hasError('email') && form.controls.email.touched) {
          <p class="text-xs text-red-300">Ingresa un email válido.</p>
        }
      </label>

      <label class="grid min-w-0 gap-1.5">
        <div class="relative">
          <input
            id="login-password"
            name="password"
            class="w-full appearance-none rounded-xl border bg-athlium-primary-soft/65 px-3 py-2 pr-20 text-athlium-text placeholder-athlium-muted outline-none ring-athlium-primary focus:border-athlium-primary/45 focus:ring-2"
            [class.border-red-400/45]="
              form.controls.password.invalid && form.controls.password.touched
            "
            [class.border-athlium-primary/15]="
              !(form.controls.password.invalid && form.controls.password.touched)
            "
            [type]="showPassword() ? 'text' : 'password'"
            [autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'"
            placeholder="Contraseña"
            formControlName="password"
          />
          <button
            type="button"
            class="absolute right-2 top-1/2 inline-flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-md text-athlium-muted transition hover:text-athlium-text"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            (click)="togglePasswordVisibility()"
          >
            <span class="material-symbols-outlined text-[18px] leading-none">
              {{ showPassword() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
        @if (form.controls.password.hasError('required') && form.controls.password.touched) {
          <p class="text-xs text-red-300">Ingresa tu contraseña.</p>
        }
        @if (form.controls.password.hasError('minlength') && form.controls.password.touched) {
          <p class="text-xs text-red-300">La contraseña debe tener al menos 6 caracteres.</p>
        }
      </label>

      <button
        type="submit"
        class="mt-2 rounded-xl bg-athlium-primary px-4 py-2 font-semibold text-athlium-text shadow-[0_10px_24px_rgba(53,109,255,0.35)] transition hover:brightness-110 disabled:opacity-60"
        [disabled]="loading()"
      >
        {{ loading() ? 'Procesando...' : mode() === 'login' ? 'Ingresar' : 'Crear cuenta' }}
      </button>

      <button
        type="button"
        class="rounded-xl border border-athlium-primary/12 bg-athlium-surface-2/40 px-4 py-2 font-semibold text-athlium-text transition hover:bg-athlium-surface-2/70 disabled:opacity-60"
        [disabled]="loading()"
        (click)="setMode(mode() === 'login' ? 'register' : 'login')"
      >
        {{ mode() === 'login' ? 'Quiero registrarme' : 'Ya tengo cuenta' }}
      </button>

      <a class="mt-2 text-sm text-athlium-muted underline" href="#" aria-disabled="true">
        Recuperar contraseña
      </a>
    </form>
  </section>
</main>
